{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}?v=22">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=22">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/e1db635686.js" crossorigin="anonymous"></script>
    <title>Add Tenant - RentEasy</title>
    <link rel="icon" href="{% static 'img/faviclogo.png' %}">
</head>
<body class="theme-landlord">
<script src="{% static 'Js/theme.js' %}?v=22"></script>
<nav>
  <div class="navbar" id="navbar">
    <img src="{% static 'img/renteasylogo.png' %}" alt="Logo">
    <div class="logoss">
      <span>RENT</span><span style="color: var(--re-primary);">EASY</span>
    </div>
    <div class="userbox">
      <a href="{% url 'profile' %}">
        <img id="Profile" src="{% static 'img/user.jpg' %}" alt="Profile Picture">
        <span class="welcuser">Hi, {{ request.user.name|default:"User" }}!</span>
      </a>
    </div>
  </div>
</nav>
{% include "landlord/_sidebar.html" %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const radios = document.querySelectorAll("input[name='tenant_type']");
    function updateLabels() {
        const type = document.querySelector("input[name='tenant_type']:checked").value;
        document.getElementById("tenantTypeLabel").textContent =
          type === "new" ? "New Tenant (vacant unit)" : "Existing Tenant (already living there)";
    }
    radios.forEach(r => r.addEventListener("change", updateLabels));
    updateLabels();
});
function toggleDropdown(){event.preventDefault();var d=event.target.closest(".dropdown");var m=d?d.querySelector(".dropdown-menu"):null;if(d&&m){d.classList.toggle("active");m.style.maxHeight=m.style.maxHeight?"":m.scrollHeight+"px";}}
</script>

<div class="dashcont">
  <h1 class="advant3" style="color:var(--re-primary);">Add Tenant</h1>
  {% if messages %}<ul class="messages">{% for m in messages %}<li class="{{ m.tags|default:'info' }}">{{ m }}</li>{% endfor %}</ul>{% endif %}

  <div class="contactform" style="max-width:600px;">
    <form method="post">
      {% csrf_token %}
      <h3 id="tenantTypeLabel" style="margin-top:0; color:var(--re-primary);"></h3>
      <div style="margin-bottom:12px;">
        <label><input type="radio" name="tenant_type" value="new" checked> New tenant (vacant property)</label><br>
        <label><input type="radio" name="tenant_type" value="existing"> Existing tenant (migration)</label>
      </div>

      <h3>Tenant details</h3>
      <label>Full name *</label>
      <input type="text" name="name" required>

      <label>Email {% comment %} required for new tenants {% endcomment %}</label>
      <input type="email" name="email" placeholder="tenant@example.com">

      <label>Phone</label>
      <input type="text" name="phone" placeholder="+254...">

      <h3>Lease details</h3>
      <label>Property *</label>
      <select name="property_id" required>
        <option value="">Select property</option>
        {% for p in properties %}
        <option value="{{ p.id }}">{{ p.name }} — {{ p.address }}</option>
        {% endfor %}
      </select>

      <label>Unit (optional)</label>
      <select name="unit_id">
        <option value="">Auto-select vacant unit</option>
        {% for u in units %}
        <option value="{{ u.id }}">{{ u.property.name }} — {{ u.unit_number }}</option>
        {% endfor %}
      </select>

      <label>Lease start date</label>
      <input type="date" name="start_date">

      <label>Lease end date</label>
      <input type="date" name="end_date">

      <label>Rent amount (per month)</label>
      <input type="number" name="rent_amount" step="500" placeholder="Auto from unit/property">

      <label>Deposit</label>
      <input type="number" name="deposit_amount" step="500" placeholder="0">

      <button type="submit" class="re-btn re-btn-primary" style="width:100%;margin-top:16px;">Save Tenant</button>
    </form>
  </div>
</div>
</body>
</html>
