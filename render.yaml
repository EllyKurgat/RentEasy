services:
  - type: web
    name: rms
    plan: free
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      rm -rf staticfiles
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn RMS.wsgi:application --bind 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: rms-db
          property: connectionString
      - key: MPESA_ENVIRONMENT
        value: "sandbox"
      - key: MPESA_CONSUMER_KEY
        value: "GR8YDifxXnM87Pptaag2gFijlozxQSPt9wzdr3yerRIIwONF"
